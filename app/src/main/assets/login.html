<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PAX União</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #fdfaf5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .mobile-container { width: 100%; max-width: 400px; background-color: white; display: flex; flex-direction: column; min-height: 100vh; }

        .header { background-color: #fff6e9; padding: 40px 20px 20px; text-align: center; }
        .logo-placeholder { width: 220px; height: 70px; background: url('logo.png') no-repeat center; background-size: contain; margin: 0 auto; }

        .form-container { padding: 30px 25px; flex: 1; }
        .welcome-text { font-size: 20px; color: #2f3ad3; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .instruction-text { font-size: 14px; color: #666; margin-bottom: 25px; text-align: center; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #322fd3; }
        .input-group .toggle-pass { left: auto; right: 15px; cursor: pointer; color: #aaa; }

        input[type="tel"], input[type="password"], input[type="text"] {
            width: 100%; padding: 15px 45px; border-radius: 10px; border: 1px solid #ddd;
            background-color: #f8f8f8; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: #322fd3; background-color: #fff; }

        .options-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 14px; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: #555; cursor: pointer; }
        .forgot-pass { color: #322fd3; text-decoration: none; font-weight: 500; }

        .btn-main { width: 100%; padding: 16px; background-color: #322fd3; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background-color: #ccc; cursor: not-allowed; }

        .error-msg { display: none; background-color: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; border: 1px solid #ffcdd2; }

        /* Overlay Loading */
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; color: #322fd3; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #322fd3; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="id-loading" class="loading-overlay">
    <div class="spinner"></div>
    <span id="loading-text">Autenticando...</span>
</div>

<div class="mobile-container">
    <div class="header">
        <div class="logo-placeholder"></div>
    </div>

    <div class="form-container">
        <h2 class="welcome-text">Bem-vindo(a)</h2>
        <p class="instruction-text">Acesse sua conta para continuar.</p>
        
        <div class="error-msg" id="loginError">CPF ou senha inválidos.</div>

        <div class="input-group">
            <i class="fa-solid fa-address-card"></i>
            <input type="tel" id="cpf" placeholder="CPF" maxlength="14" oninput="mascaraCPF(this)">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="senha" placeholder="Senha">
            <i class="fa-solid fa-eye toggle-pass" onclick="toggleVisibility('senha', this)"></i>
        </div>

        <div class="options-row">
            <label class="remember-me">
                <input type="checkbox" id="chkLembrar"> Lembrar senha
            </label>
            <a href="login_recuperar_senha.html" class="forgot-pass">Esqueceu a senha?</a>
        </div>

        <button class="btn-main" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
    </div>
</div>

<script>
    // Executa ao carregar a página
    window.addEventListener('load', () => {
        // Verifica se há credenciais salvas no Android
        if (typeof Android !== 'undefined') {
            const cpfSalvo = Android.getSavedCpf();
            const senhaSalva = Android.getSavedPassword();
            
            if (cpfSalvo && senhaSalva) {
                document.getElementById('cpf').value = cpfSalvo;
                document.getElementById('senha').value = senhaSalva;
                document.getElementById('chkLembrar').checked = true;
                mascaraCPF(document.getElementById('cpf'));
            }
        }
    });

    function toggleVisibility(id, icon) {
        const el = document.getElementById(id);
        if (el.type === "password") {
            el.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            el.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function mascaraCPF(i) {
        let v = i.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        i.value = v;
    }

    function toggleLoading(show) {
        document.getElementById('id-loading').style.display = show ? 'flex' : 'none';
        document.getElementById('btnEntrar').disabled = show;
    }

    // Função chamada pelo Android se o login falhar
    function showLoginError(msg) {
        toggleLoading(false);
        const errorDiv = document.getElementById('loginError');
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
    }

    function fazerLogin() {
        const cpfRaw = document.getElementById('cpf').value;
        const cpf = cpfRaw.replace(/\D/g, "");
        const senha = document.getElementById('senha').value;
        const lembrar = document.getElementById('chkLembrar').checked;

        if (cpf.length !== 11) {
            showLoginError("Informe um CPF válido com 11 dígitos.");
            return;
        }
        if (senha.length < 3) {
            showLoginError("Informe sua senha.");
            return;
        }

        document.getElementById('loginError').style.display = 'none';
        toggleLoading(true);

        // Chama a ponte com o Android
        if (typeof Android !== 'undefined' && Android.realizarLoginAndroid) {
            Android.realizarLoginAndroid(cpf, senha, lembrar);
        } else {
            // Apenas para teste no navegador do PC
            setTimeout(() => { showLoginError("Interface Android não detectada."); }, 1500);
        }
    }
</script>

</body>
</html>
