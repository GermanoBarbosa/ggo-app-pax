<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - PAX União</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fdfaf5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background-color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header com logo */
        .header {
            background-color: #fff6e9;
            padding: 20px;
            text-align: center;
            flex: 0.25;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder {
            width: 220px;
            height: 55px;
            background: url('logo.png') no-repeat center;
            background-size: contain;
            margin-bottom: 15px;
        }

        .title {
            color: #2f3ad3;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            font-size: 14px;
            text-align: center;
            max-width: 85%;
        }

        /* Conteúdo principal */
        .form-container {
            padding: 30px 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .code-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 30px 0 40px;
        }

        .code-input {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 12px;
            background-color: #f8f8f8;
            transition: all 0.2s;
            outline: none;
        }

        .code-input:focus {
            border-color: #3a2fd3;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(58, 47, 211, 0.15);
        }

        .resend-container {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            color: #555;
        }

        .resend-link {
            color: #322fd3;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #aaa;
            pointer-events: none;
            text-decoration: none;
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background-color: #322fd3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-verify:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .error-message {
            color: #c62828;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            color: #555;
            font-size: 14px;
        }

        .back-link a {
            color: #322fd3;
            text-decoration: none;
            font-weight: 500;
        }
 /* Tela de carregamento (Overlay) */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #322fd3;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #322fd3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estilo para botão desabilitado */
        .btn-main:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }                
    </style>
</head>
<body>
<div id="id-loading" class="loading-overlay">
    <div class="spinner" id="loading-spinner"></div>
    <i class="fa-solid fa-circle-check" id="success-icon" style="display: none; font-size: 50px; color: #2ecc71; margin-bottom: 10px;"></i>
    <span id="loading-text">Buscando informações...</span>
</div>    
<div class="mobile-container">
    <div class="header">
        <div class="logo-placeholder"></div>
        <div class="title">Verificar Código</div>
        <p class="subtitle" id="subtitleText">
            Digite o código de 6 dígitos enviado para<br>
            <strong id="destination">seu e-mail / telefone</strong>
        </p>
    </div>

    <div class="form-container">
        <div class="code-container" id="codeContainer">
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code1" autofocus>
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code2">
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code3">
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code4">
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code5">
            <input type="text" class="code-input" maxlength="1" autocomplete="off" inputmode="numeric" id="code6">
        </div>

        <div class="resend-container">
            Não recebeu o código? 
            <span class="resend-link" id="resendLink" onclick="resendCode()">Reenviar</span>
            <span id="countdown" style="display:none;">(aguarde <span id="timer">60</span>s)</span>
        </div>

        <button class="btn-verify" id="verifyBtn" disabled onclick="verifyCode()">Verificar Código</button>

        <div class="error-message" id="errorMsg">
            Código inválido. Tente novamente.
        </div>

        <div class="back-link">
            <a href="javascript:history.back()">Voltar</a>
        </div>
    </div>
</div>

<script>

    // 1. Gerenciador de UI (Loading e Sucesso)
    function updateLoader(text, showSpinner = true, showSuccess = false) {
        const loader = document.getElementById('id-loading');
        const spinner = document.getElementById('loading-spinner');
        const successIcon = document.getElementById('success-icon');
        const label = document.getElementById('loading-text');

        loader.style.display = 'flex';
        label.innerText = text;
        spinner.style.display = showSpinner ? 'block' : 'none';
        successIcon.style.display = showSuccess ? 'block' : 'none';
    }

    function toggleLoading(show) {
        const btn = document.querySelector('.btn-verify');
        if (show) {
            // Resetar para estado inicial de busca            
            updateLoader("Buscando informações...", true, false);
            btn.disabled = true;
        } else {
            document.getElementById('id-loading').style.display = 'none';
            btn.disabled = false;
        }
    }    
    const inputs = document.querySelectorAll('.code-input');
    const verifyBtn = document.getElementById('verifyBtn');
    const errorMsg = document.getElementById('errorMsg');
    const resendLink = document.getElementById('resendLink');
    const countdownEl = document.getElementById('countdown');
    const timerEl = document.getElementById('timer');

    // Captura os parâmetros da URL
    const urlParams = new URLSearchParams(window.location.search);
    const cpfUsuario = urlParams.get('cpf') || ""; // Retorna o valor do CPF ou vazio se não existir    

    let countdown = 60;
    let timerInterval = null;

    // Navegação automática entre os campos
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1) {
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            }
            checkIfComplete();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });

        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const digits = pasteData.replace(/\D/g, '').slice(0, 6);
            
            if (digits.length > 0) {
                digits.split('').forEach((digit, i) => {
                    if (index + i < inputs.length) {
                        inputs[index + i].value = digit;
                    }
                });
                const nextFocus = Math.min(index + digits.length, inputs.length - 1);
                inputs[nextFocus].focus();
                checkIfComplete();
            }
        });
    });

    function checkIfComplete() {
        const code = Array.from(inputs).map(i => i.value).join('');
        verifyBtn.disabled = code.length !== 6;
        errorMsg.style.display = 'none';
    }

    function verifyCode() {
        const code = Array.from(inputs).map(i => i.value).join('');
        
        if (code.length !== 6) return;

        toggleLoading(true);
        // Chamada para o Android passando (CPF, CÓDIGO)
        if (typeof Android !== 'undefined' && Android.verificarCodigo) {
            // O CPF capturado da URL entra como primeiro parâmetro
            
            if (Android.verificarCodigo(cpfUsuario, code)){
                updateLoader("Código válido!", false, true);
                setTimeout(() => {
                    // (NÃO gera histórico)
                    window.location.replace("login_nova_senha.html?cpf=" + cpfUsuario + "&code=" + code);                    
                }, 1500);
            } else {
                toggleLoading(false);
                errorMsg.style.display = 'block';
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
            }; 
        } else {
            setTimeout(() => { // Simulação caso teste no navegador
                toggleLoading(false);
// Simulação para testes no navegador
            console.log('Dados enviados:', { cpf: cpfUsuario, codigo: code });
            
            if (code === '123456') { 
                alert('Código válido para o CPF ' + cpfUsuario);
                // Lembre-se do que conversamos: se for mudar de página aqui, 
                // use window.location.replace('proxima_pagina.html');
            } else {
                errorMsg.style.display = 'block';
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
            }                
            }, 1000);            
            
        }
    }

    function resendCode() {
        if (resendLink.classList.contains('disabled')) return;

        // Desabilita o link e inicia contagem
        resendLink.classList.add('disabled');
        countdownEl.style.display = 'inline';
        timerEl.textContent = countdown;

        timerInterval = setInterval(() => {
            countdown--;
            timerEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timerInterval);
                resendLink.classList.remove('disabled');
                countdownEl.style.display = 'none';
                countdown = 60;
            }
        }, 1000);

        // Chama Android para reenviar código
        if (typeof Android !== 'undefined' && Android.reenviarCodigo) {
            Android.reenviarCodigo();
        } else {
            alert('Código reenviado (simulação).');
        }
    }

    // Preenche o texto de destino (email ou telefone mascarado)
    window.addEventListener('load', () => {
        if (typeof Android !== 'undefined' && Android.getDestinoVerificacao) {
            const destino = Android.getDestinoVerificacao();
            document.getElementById('destination').textContent = destino;
        } else {
            // Exemplo fallback
            document.getElementById('destination').textContent = 'exemplo@email.com';
        }
    });
</script>

</body>
</html>
